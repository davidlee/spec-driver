    - ADR-004
    - ADR-006
    tags:
    - contracts
    - architecture
    - sync
  ADR-008:
    id: ADR-008
    title: 'ADR-008: normative lifecycle truth and observed evidence reconciliation'
    status: accepted
    path: specify/decisions/ADR-008-normative_lifecycle_truth_and_observed_evidence_reconciliation.md
    summary: Specs own normative lifecycle truth; audits, deltas, and contracts contribute
      observed evidence overlays; drift is reconciled explicitly rather than silently
      by timestamp precedence.
    created: '2026-03-06'
    updated: '2026-03-06'
    reviewed: '2026-03-06'
