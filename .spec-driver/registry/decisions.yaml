    tags:
    - documentation
    - memories
    - skills
    - doctrine
  ADR-006:
    id: ADR-006
    title: 'ADR-006: consolidate workspace directories under .spec-driver'
    status: accepted
    path: specify/decisions/ADR-006-consolidate_workspace_directories_under_spec_driver.md
    summary: Canonical spec-driver workspace directories move under .spec-driver/
      with backward-compat root symlinks; migration tooling and content reference
      cleanup are deferred.
    created: '2026-03-06'
    updated: '2026-03-06'
    reviewed: '2026-03-06'
    related_decisions:
    - ADR-001
    - ADR-003
    tags:
    - architecture
    - workspace
    - install
  ADR-007:
    id: ADR-007
    title: 'ADR-007: contracts are derived observed corpus with dedicated canonical
      storage'
    status: accepted
    path: specify/decisions/ADR-007-contracts_are_derived_observed_corpus_with_dedicated_canonical_storage.md
    summary: Contracts are derived observation artefacts, not competing intent; they
      belong in a dedicated canonical contracts corpus, while spec-bundle and index
      paths remain derived compatibility or navigation views.
    created: '2026-03-06'
    updated: '2026-03-06'
    reviewed: '2026-03-06'
    specs:
    - PROD-005
    - PROD-012
    - PROD-014
    deltas:
