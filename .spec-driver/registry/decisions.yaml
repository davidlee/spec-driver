  ADR-002:
    id: ADR-002
    title: 'ADR-002: Do not store backlinks in frontmatter'
    status: accepted
    path: specify/decisions/ADR-002-do-not-store-backlinks-in-frontmatter.md
    summary: Backlinks between artifacts must be computed at runtime from forward
      references, not stored in frontmatter, to prevent data consistency issues and
      maintain single source of truth.
    created: '2025-11-02'
    updated: '2025-11-02'
    reviewed: '2025-11-02'
    specs:
    - PROD-003
    related_decisions:
    - ADR-001
    tags:
    - architecture
    - data-model
    - governance
  ADR-003:
    id: ADR-003
    title: 'ADR-003: Separate unit and assembly specs'
    status: accepted
    path: specify/decisions/ADR-003-separate_unit_and_assembly_specs.md
    summary: Introduce explicit separation between auto-generated unit specs (1:1
      with code units) and human-authored assembly specs (cross-unit), with a clear
      truth/precedence model.
    created: '2026-02-20'
    updated: '2026-02-21'
    reviewed: '2026-02-21'
