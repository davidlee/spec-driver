spec_driver_installed_version = "0.7.2"
ceremony = "town_planner" # pioneer | settler | town_planner

[tool]
exec = "uv run spec-driver"

[verification]
command = "just check"

[cards]
enabled = true
root = "kanban"
lanes = ["backlog", "next", "doing", "finishing", "done"]
id_prefix = "T" # produces T123-* ids

[docs]
artefacts_root = "doc/artefacts" # design docs / artefacts, keyed by T123-*
plans_root = "doc/plans"         # implementation plans, keyed by T123-*

[policy]
adrs = true
policies = true
standards = true

[sync]
spec_autocreate = true

[contracts]
enabled = true
root = ".contracts"

[bootstrap]
doctrine_path = ".spec-driver/doctrine.md"

[authoring]
engine = "superpowers" # superpowers | spec_driver

